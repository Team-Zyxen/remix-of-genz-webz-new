backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "ID", name: "id", widget: "string", hint: "Unique identifier (lowercase-with-dashes)" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly slug (must match ID)" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Content (HTML)", name: "content", widget: "markdown", hint: "This will be converted to HTML" }
      - { label: "Author", name: "author", widget: "string", default: "Admin" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", dateFormat: "YYYY-MM-DD", timeFormat: false }
      - { label: "Cover Image", name: "coverImage", widget: "image" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "5 min read" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Production Management"
          - "Sales System"
          - "Task Scheduler"
          - "Website Design"
          - "General"
          - "AI News"
          - "Stuff"
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Published", name: "published", widget: "hidden", default: true }
